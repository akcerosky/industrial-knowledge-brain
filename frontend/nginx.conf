server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend container (service name "backend" in
    # docker-compose.yml) so the containerized frontend needs no CORS
    # changes -- same pattern as the local Vite dev proxy to 127.0.0.1:8000.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: let the React router handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
