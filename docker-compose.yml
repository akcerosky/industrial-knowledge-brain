version: "3.9"

services:
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-changeme}"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-ikb}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
      POSTGRES_DB: "${POSTGRES_DB:-ikb}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # pgvector/pgvector auto-runs any *.sql placed here on first boot.
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ikb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ikb}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-ikb}"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-changeme}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      API_KEY: "${API_KEY:-}"
    ports:
      - "8000:8000"
    depends_on:
      - neo4j
      - postgres

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "4173:80"
    depends_on:
      - backend

volumes:
  neo4j_data:
  postgres_data:
